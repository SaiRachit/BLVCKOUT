services:
  # Internal Redis (Valkey) Store
  - type: keyvalue
    name: observability-redis
    plan: free
    ipAllowList: [] # Internal only

  # Public API Gateway
  - type: web
    name: api-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/api_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
      # BRUTE FORCE DYNAMIC DISCOVERY
      - key: AUTH_SERVICE_URL
        value: http://${AUTH_HOST}:10000
      - key: AUTH_HOST
        fromService:
          type: pvt
          name: auth-service-internal
          property: host
      - key: CACHE_SERVICE_URL
        value: http://${CACHE_HOST}:10000
      - key: CACHE_HOST
        fromService:
          type: pvt
          name: cache-service-internal
          property: host
      - key: DATABASE_SERVICE_URL
        value: http://${DB_HOST}:10000
      - key: DB_HOST
        fromService:
          type: pvt
          name: database-service-internal
          property: host
      - key: EVENT_PROCESSOR_SERVICE_URL
        value: http://${EP_HOST}:10000
      - key: EP_HOST
        fromService:
          type: pvt
          name: event-processor-service-internal
          property: host
      - key: RCA_SERVICE_URL
        value: http://${RCA_HOST}:10000
      - key: RCA_HOST
        fromService:
          type: pvt
          name: rca-service-internal
          property: host
      - key: SYNTHETIC_GENERATOR_SERVICE_URL
        value: http://${SG_HOST}:10000
      - key: SG_HOST
        fromService:
          type: pvt
          name: synthetic-generator-service-internal
          property: host
      - key: PAYMENT_SERVICE_URL
        value: http://${PAY_HOST}:10000
      - key: PAY_HOST
        fromService:
          type: pvt
          name: payment-service-internal
          property: host
      - key: NOTIFICATION_SERVICE_URL
        value: http://${NOTIFY_HOST}:10000
      - key: NOTIFY_HOST
        fromService:
          type: pvt
          name: notification-service-internal
          property: host
      - key: API_SERVICE_URL
        value: https://api-service-yq0m.onrender.com
    healthCheckPath: /health

  # Internal Microservices (Private)
  - type: pvt
    name: auth-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/auth_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: cache-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/cache_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: database-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/database_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: event-processor-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/event_processor_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: rca-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/rca_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: synthetic-generator-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/synthetic_generator_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: notification-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/notification_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: payment-service-internal
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/payment_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: remediation-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/remediation_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  # Static Frontend
  - type: static_site
    name: blvckout
    plan: free
    publishDir: .
    envVars:
      - key: API_URL
        value: https://api-service-yq0m.onrender.com
