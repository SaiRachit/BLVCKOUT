        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: database-service
    plan: free
    runtime: docker
    dockerContext: .
