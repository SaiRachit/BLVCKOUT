  - type: pvt
    name: pay-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/payment_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
