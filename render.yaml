services:
  # 1. API Service (Public Entry Point)
  - type: web
    name: api-service
    env: docker
    dockerContext: .
    dockerfilePath: services/api_service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SERVICE_NAME
        value: api-service
      - key: PORT
        value: 10000
      - key: AUTH_SERVICE_URL
        value: http://auth-service:10000
      - key: CACHE_SERVICE_URL
        value: http://cache-service:10000
      - key: DATABASE_SERVICE_URL
        value: http://database-service:10000
      - key: PAYMENT_SERVICE_URL
        value: http://payment-service:10000
      - key: NOTIFICATION_SERVICE_URL
        value: http://notification-service:10000
      - key: EVENT_PROCESSOR_SERVICE_URL
        value: http://event-processor-service:10000
      - key: RCA_SERVICE_URL
        value: http://rca-service:10000
      - key: SYNTHETIC_GENERATOR_SERVICE_URL
        value: http://synthetic-generator-service:10000
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString

  # 2. Auth Service
  - type: web
    name: auth-service
    env: docker
    dockerContext: .
    dockerfilePath: services/auth_service/Dockerfile
    plan: free
    healthCheckPath: /health
