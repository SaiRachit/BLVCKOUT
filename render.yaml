services:
  # Internal Redis (Valkey) Store
  - type: keyvalue
    name: observability-redis
    plan: free
    ipAllowList: [] # Internal only

  # Public API Gateway
  - type: web
    name: api-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/api_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
      - key: AUTH_SERVICE_URL
        value: http://auth-service:10000
      - key: CACHE_SERVICE_URL
        value: http://cache-service:10000
      - key: DATABASE_SERVICE_URL
        value: http://database-service:10000
      - key: EVENT_PROCESSOR_SERVICE_URL
        value: http://event-processor-service:10000
      - key: RCA_SERVICE_URL
        value: http://rca-service:10000
      - key: SYNTHETIC_GENERATOR_SERVICE_URL
        value: http://synthetic-generator-service:10000
      - key: PAYMENT_SERVICE_URL
        value: http://payment-service:10000
      - key: NOTIFICATION_SERVICE_URL
        value: http://notification-service:10000
      - key: API_SERVICE_URL
        value: https://api-service-yq0m.onrender.com # Self-reference
    healthCheckPath: /health

  # Internal Microservices (Private)
  - type: pvt
    name: auth-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/auth_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: cache-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/cache_service/Dockerfile
    envVars:
