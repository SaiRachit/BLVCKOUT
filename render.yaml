services:
  # Internal Redis (Valkey) Store
  - type: keyvalue
    name: observability-redis
    plan: free
    ipAllowList: [] # Internal only

  # Public API Gateway
  - type: web
    name: api-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/api_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
      # DEFINITIVE INTERNAL ADDRESSES
      - key: AUTH_SERVICE_URL
        value: http://auth-pvt:10000
      - key: CACHE_SERVICE_URL
        value: http://cache-pvt:10000
      - key: DATABASE_SERVICE_URL
        value: http://db-pvt:10000
      - key: EVENT_PROCESSOR_SERVICE_URL
        value: http://ep-pvt:10000
      - key: RCA_SERVICE_URL
        value: http://rca-pvt:10000
      - key: SYNTHETIC_GENERATOR_SERVICE_URL
        value: http://sg-pvt:10000
      - key: PAYMENT_SERVICE_URL
        value: http://pay-pvt:10000
      - key: NOTIFICATION_SERVICE_URL
        value: http://notif-pvt:10000
      - key: API_SERVICE_URL
        value: https://api-service-yq0m.onrender.com
    healthCheckPath: /health

  # Internal Microservices (Private Network)
  - type: pvt
    name: auth-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/auth_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: cache-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/cache_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: db-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/database_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: ep-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/event_processor_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: observability-redis
          property: connectionString
    healthCheckPath: /health

  - type: pvt
    name: rca-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/rca_service/Dockerfile
    envVars:
      - key: PORT
