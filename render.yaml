services:
  # Public API Gateway
  - type: web
    name: api-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/api_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      # Bypass variables for UI Dashboard overrides
      - key: PRIVATE_AUTH_URL
        fromService:
          type: pserv
          name: auth-pvt
          property: host
      - key: PRIVATE_CACHE_URL
        fromService:
          type: pserv
          name: cache-pvt
          property: host
      - key: PRIVATE_DB_URL
        fromService:
          type: pserv
          name: db-pvt
          property: host
      - key: PRIVATE_EP_URL
        fromService:
          type: pserv
          name: ep-pvt
          property: host
      - key: PRIVATE_RCA_URL
        fromService:
          type: pserv
          name: rca-pvt
          property: host
      - key: PRIVATE_SG_URL
        fromService:
          type: pserv
          name: sg-pvt
          property: host
      - key: PRIVATE_NOTIF_URL
        fromService:
          type: pserv
          name: notif-pvt
          property: host
      - key: PRIVATE_PAY_URL
        fromService:
          type: pserv
          name: pay-pvt
          property: host
      - key: API_SERVICE_URL
        value: https://api-service-yq0m.onrender.com

  # Internal Microservices (Private Network)
  - type: pserv
    name: auth-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/auth_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: cache-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/cache_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: db-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/database_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: ep-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/event_processor_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: rca-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/rca_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: sg-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/synthetic_generator_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: notif-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/notification_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: pay-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/payment_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: pserv
    name: remed-pvt
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/remediation_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
