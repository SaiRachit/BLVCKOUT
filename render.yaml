services:
  # Public API Gateway
  - type: web
    name: api-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/api_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      # Bypass variables for UI Dashboard overrides
      - key: PRIVATE_AUTH_URL
        fromService:
          type: web
          name: auth-service
          property: host
      - key: PRIVATE_CACHE_URL
        fromService:
          type: web
          name: cache-service
          property: host
      - key: PRIVATE_DB_URL
        fromService:
          type: web
          name: database-service
          property: host
      - key: PRIVATE_EP_URL
        fromService:
          type: web
          name: event-processor-service
          property: host
      - key: PRIVATE_RCA_URL
        fromService:
          type: web
          name: rca-service
          property: host
      - key: PRIVATE_SG_URL
        fromService:
          type: web
          name: synthetic-generator-service
          property: host
      - key: PRIVATE_NOTIF_URL
        fromService:
          type: web
          name: notification-service
          property: host
      - key: PRIVATE_PAY_URL
        fromService:
          type: web
          name: payment-service
          property: host
      - key: API_SERVICE_URL
        value: https://api-service-yq0m.onrender.com

  # Internal Microservices (Public Web Services for Free Tier)
  - type: web
    name: auth-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/auth_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: cache-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/cache_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: database-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/database_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: event-processor-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/event_processor_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: rca-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/rca_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: synthetic-generator-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/synthetic_generator_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: notification-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/notification_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: payment-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/payment_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"

  - type: web
    name: remediation-service
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: services/remediation_service/Dockerfile
    envVars:
      - key: PORT
        value: "10000"
