          name: observability-redis
          property: connectionString
      - key: SYNTHETIC_GENERATOR_ENABLED
        value: "true"

  # 11. Redis Instance
  - type: keyvalue
    name: observability-redis
    plan: free
    ipAllowList: [] # Only internal access
